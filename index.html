<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Effect Sculptor</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0a0a0f;
        color: #ccc;
        font-family: "SF Mono", "Fira Code", monospace;
        overflow: hidden;
      }

      #canvas3d {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0;
      }

      #cam-container {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 600px;
        z-index: 10;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.1);
        transform: scaleX(-1);
        cursor: grab;
      }
      #cam-container.dragging {
        cursor: grabbing;
      }

      #video {
        width: 100%;
        display: block;
      }

      #hand-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        padding: 20px;
        z-index: 10;
        pointer-events: none;
      }

      h1 {
        font-size: 14px;
        font-weight: 400;
        letter-spacing: 3px;
        text-transform: uppercase;
        opacity: 0.5;
      }

      #status {
        margin-top: 8px;
        font-size: 12px;
        opacity: 0.4;
      }

      #params {
        margin-top: 12px;
        font-size: 13px;
        opacity: 0.6;
        letter-spacing: 1px;
        white-space: pre-line;
      }

      #controls {
        position: fixed;
        bottom: 20px;
        left: 20px;
        z-index: 10;
      }

      #start-btn,
      #song-label {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: #ccc;
        padding: 10px 24px;
        border-radius: 6px;
        cursor: pointer;
        font-family: inherit;
        font-size: 13px;
        letter-spacing: 2px;
        text-transform: uppercase;
        transition: all 0.2s;
      }

      #start-btn:hover,
      #song-label:hover {
        background: rgba(255, 255, 255, 0.15);
      }

      #song-input {
        display: none;
      }

      #song-name {
        font-size: 11px;
        opacity: 0.4;
        margin-top: 6px;
      }

      #guide {
        position: fixed;
        bottom: 80px;
        left: 20px;
        z-index: 10;
        font-size: 11px;
        opacity: 0.35;
        line-height: 1.8;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas3d"></canvas>
    <div id="cam-container">
      <video id="video" autoplay playsinline></video>
      <canvas id="hand-overlay"></canvas>
    </div>

    <div id="overlay">
      <h1>Effect Sculptor</h1>
      <div id="status">Initializing...</div>
      <div id="params"></div>
    </div>

    <div id="guide">
      <strong style="opacity: 0.7">Right hand (effects)</strong><br />
      Index &rarr; Filter cutoff<br />
      Middle &rarr; Reverb<br />
      Ring &rarr; Delay<br />
      Pinky &rarr; Distortion<br />
      <br />
      <strong style="opacity: 0.7">Left hand (tone)</strong><br />
      Index &rarr; Pitch<br />
      Middle &rarr; Volume<br />
      Ring &rarr; Tremolo<br />
      Pinky &rarr; Spread
    </div>

    <div id="controls">
      <button id="start-btn">Start</button>
      <label id="song-label" for="song-input">Load Song</label>
      <input id="song-input" type="file" accept="audio/*" />
      <div id="song-name"></div>
    </div>

    <script>
      const cam = document.getElementById("cam-container");
      let dragging = false,
        ox,
        oy,
        sx,
        sy;
      cam.addEventListener("mousedown", (e) => {
        dragging = true;
        cam.classList.add("dragging");
        ox = e.clientX;
        oy = e.clientY;
        sx = cam.offsetLeft;
        sy = cam.offsetTop;
      });
      window.addEventListener("mousemove", (e) => {
        if (!dragging) return;
        cam.style.left = sx + (e.clientX - ox) + "px";
        cam.style.top = sy + (e.clientY - oy) + "px";
        cam.style.right = "auto";
        cam.style.bottom = "auto";
      });
      window.addEventListener("mouseup", () => {
        dragging = false;
        cam.classList.remove("dragging");
      });
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
